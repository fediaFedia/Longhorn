[Rainmeter]
Group=LonghornSidebar


Author=Xyrfo and fediaFedia
MouseActionCursor=0
MiddleMouseUpAction=!DeactivateConfig
Update=2000
RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=#Settings#
ContextAction=["#@#Config.exe" #Type# "#CURRENTCONFIG#" "#CURRENTFILE#" "#SETTINGSPATH#" "#SKINSPATH#" "#PROGRAMPATH#" "#scaledpi#"]

ContextTitle2=#Alternative#
ContextAction2=[!ActivateConfig "#CURRENTCONFIG#"]
ContextTitle3=#Close#
ContextAction3=[!DeactivateConfig]

ContextTitle4=----
ContextAction4=[]
ContextTitle5=#MoreActions#
ContextAction5=[!SkinMenu]

OnRefreshAction=[!Move (#screenareawidth#-#movewhere#) #CURRENTCONFIGY#] 
MouseOverAction=[!ShowMeter Main][!ShowMeter Play][!Redraw]
MouseLeaveAction=[!HideMeter Main][!HideMeter Play][!Redraw]


 [Metadata]
Version=2.1
Information=Shortcut Item
License=Creative Commons Attribution-Noncommercial-Share Alike 3.0 License

[Variables]
Height=154
PanelType=halfsingle
@include=#@#global.inc
@include1=#@#Common\color\color.inc

@include3=#@##Structure#\#PanelType#\Main.inc
@include4=#currentpath#\UserVariables.inc

@include5=#@#Languages\#MainLanguage#.inc
@include6=#SkinsPath#\Longhorn Sidebar\UserVariables.inc
LastVolume=0


[Image]
Meter=Image
MeterStyle=FullStyle
ImageName=#Background#
; This will get if the browser extension is connected.
[MeasureStatus]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Status

; This measures the player, e.g. 'YouTube', 'Spotify', etc.
[MeasurePlayer]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Player
UpdateDivider = 5
Substitute="":"N/A"

; Self explanatory
[MeasureTitle]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Title
UpdateDivider = 5
Substitute="":"N/A"

; Self explanatory
[MeasureArtist]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Artist
UpdateDivider = 5
Substitute="":"N/A"

; Self explanatory
[MeasureAlbum]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Album
UpdateDivider = 5
Substitute="":"N/A"

; This will return the path to the cover art.
[MeasureAlbumArt]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Cover
; The DefaultPath will be returned when no cover art has been found.
DefaultPath=nocover.png
UpdateDivider = 5

; The URL of the currently displayed image
; Note this is updated once a PlayerType=Cover has updated so it is safe to assume that the image has been updated
[MeasureAlbumArtAddress]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=CoverWebAddress
UpdateDivider = 5

; Elapsed time in hh:mm:ss or mm:s
[MeasurePosition]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Position
UpdateDivider = 5
Substitute="":"N/A"

; Duration in hh:mm:ss or mm:ss
[MeasureDuration]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Duration
UpdateDivider = 5
Substitute="":"N/A"

; Remaining time in hh:mm:ss or mm:ss
[MeasureRemaining]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Remaining
UpdateDivider = 5
Substitute="":"N/A"

; Percent of elapsed time, out of 100.
[MeasureProgress]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Progress
Substitute="":"N/A"

; Volume from 1-100
[MeasureVolume]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=Volume
Substitute="":"N/A"

; The playing state
; 0 = Stopped
; 1 = Playing
; 2 = Paused
[MeasurePlayPause]
Measure=Plugin
Plugin=WebNowPlaying
PlayerType=State
Substitute="0":"Play","1":"Pause","2":"Play","3":"Replay"



[MeasureMediaKey]
Measure=MediaKey




[buttanstyl]
X=((#height#)/(150/15)*#scaledpi#)R
Y=r
W=((#height#)/(150/30))*#scaledpi#
H=((#height#)/(150/30))*#scaledpi#
SolidColor=0,0,0,1
ImageAlpha=230
ImageTint=#textcolor2#,#paneltitleopacity#
MouseActionCursor=1


[Main]
Meter=Image
Imagename=media.png
x=(18*#scaledpi#)
w=(#height#/1.2*#scaledpi#)
y=(48*#scaledpi#)
Hidden=1

[Hover]
Meter=Image
Imagename=hover2.png
x=(20*#scaledpi#)
w=(32*#scaledpi#)
y=(50*#scaledpi#)
Hidden=1

[Play]
Meter=Image
Imagename=[MeasurePlayPause]
x=(24*#scaledpi#)
w=(24*#scaledpi#)
y=(52*#scaledpi#)
solidcolor=0,0,0,1
LeftMouseUpAction=[!CommandMeasure MeasureMediaKey "PlayPause"][!Update]
MouseOverAction=[!ShowMeter Hover][!Redraw]
MouseLeaveAction=[!HideMeter Hover][!Redraw]
DynamicVariables=1

imagetint=0,0,0
Hidden=1



[Artist]
MeasureName=MeasureArtist
Meter=String
MeterStyle=Default
y=(10*#scaledpi#)
x=(10*#scaledpi#)
w=((#height#-5)*#scaledpi#)
Clipstring=1
LeftMouseUpAction=[!CommandMeasure mPlayer OpenPlayer]

[Subtitle]
MeasureName=MeasureTitle
Meter=String
MeterStyle=Default
y=R
x=r
ClipString=1
FontSize=(7*#scaledpi#)
w=(#height#-5)
LeftMouseUpAction=[!CommandMeasure mPlayer OpenPlayer]
Clipstring=1



[Progress]
Meter=BAR
MeasureName=mBadYearlyProgress
X=0
Y=(81*#scaledpi#)
W=(#Height#)*#scaledpi#
H=(3)*#scaledpi#
BarColor=8,255,7,150
BarImage=progress.png
SolidColor=0,0,0,0
BarOrientation=HORIZONTAL
LeftMouseUpAction=[!CommandMeasure "mStateButtan" "SetPosition $MouseX:%$"][!Update]
MouseActionCursor=1


[Cont]
w=(25*#scaledpi#)
h=(25*#scaledpi#)
x=R
y=r
solidcolor=0,0,0,1
ToolTipText=#currentsection#
MouseActionCursor=1
LeftMouseUpAction=[!CommandMeasure mPlayer #currentsection#][!Update]

[Stop]
Meter=string
x=(40*#scaledpi#)
y=(50*#scaledpi#)
MeterStyle=Cont
LeftMouseUpAction=!execute [!CommandMeasure "MeasureMediaKey" "Stop"]

[Previous]
Meter=string
MeterStyle=Cont
LeftMouseUpAction=!execute [!CommandMeasure "MeasureMediaKey" "PrevTrack"]

[Next]
Meter=string
MeterStyle=Cont
LeftMouseUpAction=!execute [!CommandMeasure "MeasureMediaKey" "NextTrack"]


[Mute]
Meter=string
MeterStyle=Cont
LeftMouseUpAction=[!CommandMeasure "MeasureMediaKey" "VolumeMute"][!HideMeter Mute][!ShowMeter Unmute][!Redraw][!Update]
DynamicVariables=1

[Unmute]
Meter=string
MeterStyle=Cont
LeftMouseUpAction=[!CommandMeasure "MeasureMediaKey" "VolumeMute"][!CommandMeasure mPlayer "SetVolume 100"][!HideMeter Unmute][!ShowMeter Mute][!Redraw][!Update]
Hidden=1
